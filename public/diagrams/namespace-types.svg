<svg xmlns="http://www.w3.org/2000/svg" width="760" height="320" viewBox="0 0 760 320">
  <rect width="760" height="320" fill="#0d0d0d"/>

  <text x="380" y="18" text-anchor="middle" fill="#656363" font-family="monospace" font-size="10">// six lies the kernel can tell a process — one per resource category</text>

  <!-- Row 1 -->

  <!-- PID -->
  <rect x="16" y="30" width="228" height="82" rx="3" fill="#141414" stroke="#4ade80" stroke-width="1.5"/>
  <text x="32" y="50" fill="#4ade80" font-family="monospace" font-size="10" font-weight="bold">PID namespace</text>
  <text x="32" y="67" fill="#656363" font-family="monospace" font-size="8">isolates: process IDs</text>
  <text x="32" y="82" fill="#b7b1b1" font-family="monospace" font-size="8">lie: "you are PID 1. there are</text>
  <text x="32" y="96" fill="#b7b1b1" font-family="monospace" font-size="8">     3 processes in the world."</text>

  <!-- NET -->
  <rect x="266" y="30" width="228" height="82" rx="3" fill="#141414" stroke="#67e8f9" stroke-width="1.5"/>
  <text x="282" y="50" fill="#67e8f9" font-family="monospace" font-size="10" font-weight="bold">NET namespace</text>
  <text x="282" y="67" fill="#656363" font-family="monospace" font-size="8">isolates: network stack</text>
  <text x="282" y="82" fill="#b7b1b1" font-family="monospace" font-size="8">lie: "you have your own eth0,</text>
  <text x="282" y="96" fill="#b7b1b1" font-family="monospace" font-size="8">     routing table, and firewall."</text>

  <!-- MNT -->
  <rect x="516" y="30" width="228" height="82" rx="3" fill="#141414" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="532" y="50" fill="#fbbf24" font-family="monospace" font-size="10" font-weight="bold">MNT namespace</text>
  <text x="532" y="67" fill="#656363" font-family="monospace" font-size="8">isolates: mount table</text>
  <text x="532" y="82" fill="#b7b1b1" font-family="monospace" font-size="8">lie: "this is your entire</text>
  <text x="532" y="96" fill="#b7b1b1" font-family="monospace" font-size="8">     filesystem." (chroot++)</text>

  <!-- Row 2 -->

  <!-- UTS -->
  <rect x="16" y="128" width="228" height="82" rx="3" fill="#141414" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="32" y="148" fill="#a78bfa" font-family="monospace" font-size="10" font-weight="bold">UTS namespace</text>
  <text x="32" y="165" fill="#656363" font-family="monospace" font-size="8">isolates: hostname + domain</text>
  <text x="32" y="180" fill="#b7b1b1" font-family="monospace" font-size="8">lie: "your hostname is</text>
  <text x="32" y="194" fill="#b7b1b1" font-family="monospace" font-size="8">     'web-container-42'."</text>

  <!-- IPC -->
  <rect x="266" y="128" width="228" height="82" rx="3" fill="#141414" stroke="#f87171" stroke-width="1.5"/>
  <text x="282" y="148" fill="#f87171" font-family="monospace" font-size="10" font-weight="bold">IPC namespace</text>
  <text x="282" y="165" fill="#656363" font-family="monospace" font-size="8">isolates: shared memory, semaphores</text>
  <text x="282" y="180" fill="#b7b1b1" font-family="monospace" font-size="8">lie: "your message queues</text>
  <text x="282" y="194" fill="#b7b1b1" font-family="monospace" font-size="8">     can't be seen by others."</text>

  <!-- USER -->
  <rect x="516" y="128" width="228" height="82" rx="3" fill="#141414" stroke="#fb923c" stroke-width="1.5"/>
  <text x="532" y="148" fill="#fb923c" font-family="monospace" font-size="10" font-weight="bold">USER namespace</text>
  <text x="532" y="165" fill="#656363" font-family="monospace" font-size="8">isolates: user + group IDs</text>
  <text x="532" y="180" fill="#b7b1b1" font-family="monospace" font-size="8">lie: "you are root (uid 0)</text>
  <text x="532" y="194" fill="#b7b1b1" font-family="monospace" font-size="8">     inside. uid 65534 outside."</text>

  <!-- Bottom summary -->
  <rect x="16" y="226" width="728" height="78" rx="3" fill="#0d1a0d" stroke="#4ade80" stroke-width="1"/>
  <text x="380" y="246" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="9" font-weight="bold">each namespace is an independent instance of one kernel resource</text>
  <text x="380" y="262" text-anchor="middle" fill="#656363" font-family="monospace" font-size="9">a container is a process with a new namespace for each of the six types above</text>
  <text x="380" y="278" text-anchor="middle" fill="#656363" font-family="monospace" font-size="9">the process has no idea it's sharing a host — from its perspective, it owns everything</text>
  <text x="380" y="298" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="8">kernel syscall: unshare() — creates new namespace(s) and moves calling process into them</text>
</svg>
