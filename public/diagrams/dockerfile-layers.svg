<svg xmlns="http://www.w3.org/2000/svg" width="760" height="340" viewBox="0 0 760 340">
  <rect width="760" height="340" fill="#0d0d0d"/>

  <text x="380" y="18" text-anchor="middle" fill="#656363" font-family="monospace" font-size="10">// each layer-producing instruction → one immutable snapshot → cache key is content hash</text>

  <!-- LEFT: Dockerfile -->
  <text x="185" y="36" text-anchor="middle" fill="#b7b1b1" font-family="monospace" font-size="10" font-weight="bold">Dockerfile</text>

  <rect x="16" y="46" width="338" height="26" rx="2" fill="#141414" stroke="#67e8f9" stroke-width="1.5"/>
  <text x="34" y="63" fill="#67e8f9" font-family="monospace" font-size="9">FROM python:3.12-slim</text>

  <rect x="16" y="82" width="338" height="26" rx="2" fill="#141414" stroke="#262626"/>
  <text x="34" y="99" fill="#4ade80" font-family="monospace" font-size="9">WORKDIR /app</text>

  <rect x="16" y="118" width="338" height="26" rx="2" fill="#141414" stroke="#262626"/>
  <text x="34" y="135" fill="#4ade80" font-family="monospace" font-size="9">COPY requirements.txt .</text>

  <rect x="16" y="154" width="338" height="26" rx="2" fill="#141414" stroke="#262626"/>
  <text x="34" y="171" fill="#4ade80" font-family="monospace" font-size="9">RUN pip install -r requirements.txt</text>

  <rect x="16" y="190" width="338" height="26" rx="2" fill="#141414" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="34" y="207" fill="#fbbf24" font-family="monospace" font-size="9">COPY . .                 ← code changes here</text>

  <rect x="16" y="226" width="338" height="26" rx="2" fill="#141414" stroke="#262626"/>
  <text x="34" y="243" fill="#b7b1b1" font-family="monospace" font-size="9">ENV PORT=8000</text>

  <rect x="16" y="262" width="338" height="26" rx="2" fill="#141414" stroke="#262626"/>
  <text x="34" y="279" fill="#b7b1b1" font-family="monospace" font-size="9">EXPOSE 8000</text>

  <rect x="16" y="298" width="338" height="26" rx="2" fill="#141414" stroke="#262626"/>
  <text x="34" y="315" fill="#b7b1b1" font-family="monospace" font-size="9">CMD ["uvicorn", "main:app", ...]</text>

  <!-- Middle arrows -->
  <line x1="354" y1="59" x2="380" y2="59" stroke="#67e8f9" stroke-width="1"/>
  <line x1="354" y1="95" x2="380" y2="95" stroke="#4ade80" stroke-width="1"/>
  <line x1="354" y1="131" x2="380" y2="131" stroke="#4ade80" stroke-width="1"/>
  <line x1="354" y1="167" x2="380" y2="167" stroke="#4ade80" stroke-width="1"/>
  <line x1="354" y1="203" x2="380" y2="203" stroke="#fbbf24" stroke-width="1"/>
  <line x1="354" y1="239" x2="380" y2="239" stroke="#262626" stroke-width="1"/>
  <line x1="354" y1="275" x2="380" y2="275" stroke="#262626" stroke-width="1"/>
  <line x1="354" y1="311" x2="380" y2="311" stroke="#262626" stroke-width="1"/>

  <!-- RIGHT: Layer cache behavior -->
  <text x="570" y="36" text-anchor="middle" fill="#b7b1b1" font-family="monospace" font-size="10" font-weight="bold">Build #2  (code changed, deps unchanged)</text>

  <rect x="386" y="46" width="358" height="26" rx="2" fill="#0d1a0d" stroke="#4ade80" stroke-width="1"/>
  <text x="402" y="59" fill="#4ade80" font-family="monospace" font-size="8">✓ CACHED  — python:3.12-slim base layer</text>

  <rect x="386" y="82" width="358" height="26" rx="2" fill="#0d1a0d" stroke="#4ade80" stroke-width="1"/>
  <text x="402" y="95" fill="#4ade80" font-family="monospace" font-size="8">✓ CACHED  — WORKDIR /app</text>

  <rect x="386" y="118" width="358" height="26" rx="2" fill="#0d1a0d" stroke="#4ade80" stroke-width="1"/>
  <text x="402" y="131" fill="#4ade80" font-family="monospace" font-size="8">✓ CACHED  — requirements.txt unchanged</text>

  <rect x="386" y="154" width="358" height="26" rx="2" fill="#0d1a0d" stroke="#4ade80" stroke-width="1"/>
  <text x="402" y="167" fill="#4ade80" font-family="monospace" font-size="8">✓ CACHED  — pip install (reqs unchanged)</text>

  <rect x="386" y="190" width="358" height="26" rx="2" fill="#1a1200" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="402" y="203" fill="#fbbf24" font-family="monospace" font-size="8">✗ REBUILT — COPY . .  (code changed)</text>

  <rect x="386" y="226" width="358" height="26" rx="2" fill="#1a1200" stroke="#fbbf24" stroke-width="1"/>
  <text x="402" y="239" fill="#fbbf24" font-family="monospace" font-size="8">✗ REBUILT — ENV (all layers below invalidated)</text>

  <rect x="386" y="262" width="358" height="26" rx="2" fill="#1a1200" stroke="#fbbf24" stroke-width="1"/>
  <text x="402" y="275" fill="#fbbf24" font-family="monospace" font-size="8">✗ REBUILT — EXPOSE</text>

  <rect x="386" y="298" width="358" height="26" rx="2" fill="#1a1200" stroke="#fbbf24" stroke-width="1"/>
  <text x="402" y="311" fill="#fbbf24" font-family="monospace" font-size="8">✗ REBUILT — CMD</text>
</svg>
