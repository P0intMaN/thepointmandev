<svg xmlns="http://www.w3.org/2000/svg" width="760" height="320" viewBox="0 0 760 320">
  <rect width="760" height="320" fill="#0d0d0d"/>

  <text x="380" y="18" text-anchor="middle" fill="#656363" font-family="monospace" font-size="10">// three ways to break from bridge networking — each removes a different layer of abstraction</text>

  <!-- HOST MODE -->
  <text x="120" y="36" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="9" font-weight="bold">--network host</text>

  <rect x="16" y="44" width="208" height="238" rx="3" fill="#141414" stroke="#4ade80" stroke-width="1.5"/>

  <rect x="28" y="56" width="184" height="30" rx="2" fill="#0d1a0d" stroke="#4ade80" stroke-width="1"/>
  <text x="120" y="70" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="8">Host Network Stack</text>
  <text x="120" y="82" text-anchor="middle" fill="#656363" font-family="monospace" font-size="7">eth0  192.168.1.10</text>

  <line x1="120" y1="86" x2="120" y2="100" stroke="#4ade80" stroke-width="1.5"/>
  <text x="120" y="97" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="7">shared directly</text>

  <rect x="28" y="100" width="184" height="52" rx="2" fill="#0d1a0d" stroke="#4ade80" stroke-width="1"/>
  <text x="120" y="118" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="8" font-weight="bold">Container Process</text>
  <text x="120" y="132" text-anchor="middle" fill="#656363" font-family="monospace" font-size="7">uses host eth0 directly</text>
  <text x="120" y="144" text-anchor="middle" fill="#656363" font-family="monospace" font-size="7">binds :80 on the HOST</text>

  <rect x="28" y="168" width="184" height="62" rx="2" fill="#1a1a1a" stroke="#262626"/>
  <text x="120" y="183" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="8">no veth pair</text>
  <text x="120" y="197" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="8">no bridge</text>
  <text x="120" y="211" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="8">no NAT</text>
  <text x="120" y="225" text-anchor="middle" fill="#656363" font-family="monospace" font-size="7">lowest latency possible</text>

  <rect x="28" y="248" width="184" height="26" rx="2" fill="#1a0d0d" stroke="#f87171" stroke-width="1"/>
  <text x="120" y="260" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="7">tradeoff: no port isolation</text>
  <text x="120" y="272" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="7">two containers can't share a port</text>

  <!-- NONE MODE -->
  <text x="380" y="36" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="9" font-weight="bold">--network none</text>

  <rect x="276" y="44" width="208" height="238" rx="3" fill="#141414" stroke="#67e8f9" stroke-width="1.5"/>

  <rect x="288" y="56" width="184" height="30" rx="2" fill="#141414" stroke="#262626"/>
  <text x="380" y="70" text-anchor="middle" fill="#656363" font-family="monospace" font-size="8">Host Network Stack</text>
  <text x="380" y="82" text-anchor="middle" fill="#656363" font-family="monospace" font-size="7">eth0  192.168.1.10</text>

  <line x1="380" y1="86" x2="380" y2="100" stroke="#262626" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="380" y="97" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="7">no connection</text>

  <rect x="288" y="100" width="184" height="52" rx="2" fill="#141414" stroke="#67e8f9" stroke-width="1"/>
  <text x="380" y="118" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="8" font-weight="bold">Container Process</text>
  <text x="380" y="132" text-anchor="middle" fill="#656363" font-family="monospace" font-size="7">only lo (127.0.0.1)</text>
  <text x="380" y="144" text-anchor="middle" fill="#656363" font-family="monospace" font-size="7">no external connectivity</text>

  <rect x="288" y="168" width="184" height="62" rx="2" fill="#1a1a1a" stroke="#262626"/>
  <text x="380" y="185" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="8">complete network isolation</text>
  <text x="380" y="199" text-anchor="middle" fill="#656363" font-family="monospace" font-size="7">can still: read volumes</text>
  <text x="380" y="213" text-anchor="middle" fill="#656363" font-family="monospace" font-size="7">can still: write stdout</text>
  <text x="380" y="225" text-anchor="middle" fill="#656363" font-family="monospace" font-size="7">can still: use CPU/GPU</text>

  <rect x="288" y="248" width="184" height="26" rx="2" fill="#0d1a1a" stroke="#67e8f9" stroke-width="1"/>
  <text x="380" y="260" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="7">use for: ML training, batch jobs,</text>
  <text x="380" y="272" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="7">security-sensitive compute</text>

  <!-- MACVLAN MODE -->
  <text x="640" y="36" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="9" font-weight="bold">macvlan</text>

  <rect x="536" y="44" width="208" height="238" rx="3" fill="#141414" stroke="#fbbf24" stroke-width="1.5"/>

  <rect x="548" y="56" width="184" height="30" rx="2" fill="#141414" stroke="#262626"/>
  <text x="640" y="70" text-anchor="middle" fill="#656363" font-family="monospace" font-size="8">Physical Network</text>
  <text x="640" y="82" text-anchor="middle" fill="#656363" font-family="monospace" font-size="7">192.168.1.0/24 subnet  (your router)</text>

  <line x1="600" y1="86" x2="600" y2="100" stroke="#fbbf24" stroke-width="1.5"/>
  <line x1="680" y1="86" x2="680" y2="100" stroke="#fbbf24" stroke-width="1.5"/>

  <rect x="548" y="100" width="80" height="40" rx="2" fill="#141414" stroke="#fbbf24" stroke-width="1"/>
  <text x="588" y="116" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="7" font-weight="bold">container-a</text>
  <text x="588" y="128" text-anchor="middle" fill="#656363" font-family="monospace" font-size="6">192.168.1.50</text>
  <text x="588" y="138" text-anchor="middle" fill="#656363" font-family="monospace" font-size="6">MAC: 02:42:c0:a8:01:32</text>

  <rect x="636" y="100" width="80" height="40" rx="2" fill="#141414" stroke="#fbbf24" stroke-width="1"/>
  <text x="676" y="116" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="7" font-weight="bold">container-b</text>
  <text x="676" y="128" text-anchor="middle" fill="#656363" font-family="monospace" font-size="6">192.168.1.51</text>
  <text x="676" y="138" text-anchor="middle" fill="#656363" font-family="monospace" font-size="6">MAC: 02:42:c0:a8:01:33</text>

  <rect x="548" y="158" width="184" height="54" rx="2" fill="#1a1a1a" stroke="#262626"/>
  <text x="640" y="175" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="8">containers appear on physical network</text>
  <text x="640" y="189" text-anchor="middle" fill="#656363" font-family="monospace" font-size="7">router assigns IPs directly</text>
  <text x="640" y="201" text-anchor="middle" fill="#656363" font-family="monospace" font-size="7">no NAT, no bridge between them</text>

  <rect x="548" y="248" width="184" height="26" rx="2" fill="#1a1200" stroke="#fbbf24" stroke-width="1"/>
  <text x="640" y="260" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="7">host ↔ container: broken by default</text>
  <text x="640" y="272" text-anchor="middle" fill="#656363" font-family="monospace" font-size="7">fix: macvlan sub-interface on host</text>
</svg>
