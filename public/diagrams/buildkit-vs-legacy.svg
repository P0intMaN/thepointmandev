<svg xmlns="http://www.w3.org/2000/svg" width="760" height="340" viewBox="0 0 760 340">
  <rect width="760" height="340" fill="#0d0d0d"/>

  <text x="380" y="18" text-anchor="middle" fill="#656363" font-family="monospace" font-size="10">// legacy builder executes instructions sequentially — BuildKit builds a DAG and runs independent stages in parallel</text>

  <!-- LEFT: Legacy builder -->
  <text x="170" y="36" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="9" font-weight="bold">Legacy Builder  ✗</text>
  <text x="170" y="48" text-anchor="middle" fill="#656363" font-family="monospace" font-size="7">instructions run one at a time, top to bottom</text>

  <rect x="16" y="54" width="308" height="272" rx="3" fill="#141414" stroke="#f87171" stroke-width="1.5"/>

  <!-- Sequential steps -->
  <rect x="60" y="66" width="204" height="24" rx="2" fill="#1a0d0d" stroke="#f87171" stroke-width="1"/>
  <text x="162" y="82" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="8">FROM node:20 AS frontend</text>

  <line x1="162" y1="90" x2="162" y2="100" stroke="#f87171" stroke-width="1.5"/>

  <rect x="60" y="100" width="204" height="24" rx="2" fill="#1a0d0d" stroke="#f87171" stroke-width="1"/>
  <text x="162" y="116" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="8">COPY package.json .  +  npm ci</text>

  <line x1="162" y1="124" x2="162" y2="134" stroke="#f87171" stroke-width="1.5"/>

  <rect x="60" y="134" width="204" height="24" rx="2" fill="#1a0d0d" stroke="#f87171" stroke-width="1"/>
  <text x="162" y="150" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="8">RUN npm run build</text>

  <line x1="162" y1="158" x2="162" y2="168" stroke="#f87171" stroke-width="1.5"/>

  <rect x="60" y="168" width="204" height="24" rx="2" fill="#1a0d0d" stroke="#f87171" stroke-width="1"/>
  <text x="162" y="184" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="8">FROM golang:1.22 AS backend</text>

  <line x1="162" y1="192" x2="162" y2="202" stroke="#f87171" stroke-width="1.5"/>

  <rect x="60" y="202" width="204" height="24" rx="2" fill="#1a0d0d" stroke="#f87171" stroke-width="1"/>
  <text x="162" y="218" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="8">COPY go.mod .  +  go mod download</text>

  <line x1="162" y1="226" x2="162" y2="236" stroke="#f87171" stroke-width="1.5"/>

  <rect x="60" y="236" width="204" height="24" rx="2" fill="#1a0d0d" stroke="#f87171" stroke-width="1"/>
  <text x="162" y="252" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="8">RUN go build -o server .</text>

  <rect x="30" y="278" width="280" height="36" rx="2" fill="#1a1a1a" stroke="#262626"/>
  <text x="170" y="294" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="7">frontend and backend run sequentially</text>
  <text x="170" y="308" text-anchor="middle" fill="#656363" font-family="monospace" font-size="7">total time = time(frontend) + time(backend)</text>

  <!-- RIGHT: BuildKit -->
  <text x="590" y="36" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="9" font-weight="bold">BuildKit  ✓</text>
  <text x="590" y="48" text-anchor="middle" fill="#656363" font-family="monospace" font-size="7">builds a DAG, independent stages run in parallel</text>

  <rect x="436" y="54" width="308" height="272" rx="3" fill="#141414" stroke="#4ade80" stroke-width="1.5"/>

  <!-- DAG: two branches running in parallel -->
  <!-- shared root -->
  <rect x="530" y="66" width="120" height="24" rx="2" fill="#0d1a0d" stroke="#4ade80" stroke-width="1"/>
  <text x="590" y="82" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="8">Analyse Dockerfile</text>

  <!-- branch lines -->
  <line x1="557" y1="90" x2="510" y2="108" stroke="#4ade80" stroke-width="1.5"/>
  <line x1="623" y1="90" x2="670" y2="108" stroke="#4ade80" stroke-width="1.5"/>

  <!-- frontend branch (left) -->
  <rect x="452" y="108" width="116" height="24" rx="2" fill="#0d1a0d" stroke="#4ade80" stroke-width="1"/>
  <text x="510" y="120" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="7" font-weight="bold">FROM node:20</text>
  <text x="510" y="130" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="7">frontend stage</text>

  <line x1="510" y1="132" x2="510" y2="142" stroke="#4ade80" stroke-width="1.5"/>

  <rect x="452" y="142" width="116" height="24" rx="2" fill="#0d1a0d" stroke="#4ade80" stroke-width="1"/>
  <text x="510" y="154" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="7">npm ci</text>
  <text x="510" y="164" text-anchor="middle" fill="#656363" font-family="monospace" font-size="6">cache mount ↗</text>

  <line x1="510" y1="166" x2="510" y2="176" stroke="#4ade80" stroke-width="1.5"/>

  <rect x="452" y="176" width="116" height="24" rx="2" fill="#0d1a0d" stroke="#4ade80" stroke-width="1"/>
  <text x="510" y="192" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="7">npm run build</text>

  <!-- backend branch (right) -->
  <rect x="614" y="108" width="116" height="24" rx="2" fill="#0d1a0d" stroke="#4ade80" stroke-width="1"/>
  <text x="672" y="120" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="7" font-weight="bold">FROM golang:1.22</text>
  <text x="672" y="130" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="7">backend stage</text>

  <line x1="672" y1="132" x2="672" y2="142" stroke="#4ade80" stroke-width="1.5"/>

  <rect x="614" y="142" width="116" height="24" rx="2" fill="#0d1a0d" stroke="#4ade80" stroke-width="1"/>
  <text x="672" y="154" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="7">go mod download</text>
  <text x="672" y="164" text-anchor="middle" fill="#656363" font-family="monospace" font-size="6">cache mount ↗</text>

  <line x1="672" y1="166" x2="672" y2="176" stroke="#4ade80" stroke-width="1.5"/>

  <rect x="614" y="176" width="116" height="24" rx="2" fill="#0d1a0d" stroke="#4ade80" stroke-width="1"/>
  <text x="672" y="192" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="7">go build -o server</text>

  <!-- converge to final -->
  <line x1="510" y1="200" x2="556" y2="218" stroke="#4ade80" stroke-width="1.5"/>
  <line x1="672" y1="200" x2="626" y2="218" stroke="#4ade80" stroke-width="1.5"/>

  <rect x="520" y="218" width="140" height="24" rx="2" fill="#0d1a0d" stroke="#4ade80" stroke-width="1"/>
  <text x="590" y="234" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="8">FROM scratch  (final)</text>

  <rect x="450" y="256" width="280" height="58" rx="2" fill="#1a1a1a" stroke="#262626"/>
  <text x="590" y="272" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="7">frontend and backend run simultaneously</text>
  <text x="590" y="286" text-anchor="middle" fill="#656363" font-family="monospace" font-size="7">total time = max(time(frontend), time(backend))</text>
  <text x="590" y="300" text-anchor="middle" fill="#656363" font-family="monospace" font-size="7">unused stages not built at all</text>
</svg>
