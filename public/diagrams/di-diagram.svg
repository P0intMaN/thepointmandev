<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 230" width="760" height="230">
  <defs>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f87171"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4ade80"/>
    </marker>
    <marker id="arr-green-dash" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4ade80"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="760" height="230" fill="#141414" rx="6"/>

  <!-- Centre divider -->
  <line x1="380" y1="16" x2="380" y2="214" stroke="#262626" stroke-width="1"/>

  <!-- ── LEFT: Without DI ─────────────────────────────────────────── -->
  <text x="190" y="32" text-anchor="middle" font-family="monospace" font-size="11" fill="#656363">// without DI — tight coupling</text>

  <!-- UserService -->
  <rect x="30" y="50" width="130" height="52" rx="5" fill="#1a1a1a" stroke="#262626" stroke-width="1.5"/>
  <text x="95" y="73"  text-anchor="middle" font-family="monospace" font-size="12" fill="#f1ecec" font-weight="bold">UserService</text>
  <text x="95" y="90"  text-anchor="middle" font-family="monospace" font-size="9"  fill="#656363">new UserRepository()</text>

  <!-- "new" arrow -->
  <line x1="160" y1="76" x2="228" y2="76" stroke="#f87171" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="194" y="69" text-anchor="middle" font-family="monospace" font-size="9" fill="#f87171">new</text>

  <!-- UserRepository (hardwired) -->
  <rect x="230" y="50" width="130" height="52" rx="5" fill="#1a1a1a" stroke="#f87171" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="295" y="73"  text-anchor="middle" font-family="monospace" font-size="12" fill="#f1ecec" font-weight="bold">UserRepository</text>
  <text x="295" y="90"  text-anchor="middle" font-family="monospace" font-size="9"  fill="#f87171">hard-wired</text>

  <!-- Problems -->
  <text x="190" y="128" text-anchor="middle" font-family="monospace" font-size="10" fill="#f87171">✗  tightly coupled to one implementation</text>
  <text x="190" y="147" text-anchor="middle" font-family="monospace" font-size="10" fill="#f87171">✗  can't swap in a fake for tests</text>
  <text x="190" y="166" text-anchor="middle" font-family="monospace" font-size="10" fill="#f87171">✗  dependency is hidden, not declared</text>

  <!-- ── RIGHT: With DI ────────────────────────────────────────────── -->
  <text x="570" y="32" text-anchor="middle" font-family="monospace" font-size="11" fill="#656363">// with DI — Spring manages the wiring</text>

  <!-- Spring IoC container -->
  <rect x="490" y="42" width="160" height="40" rx="5" fill="#14532d" stroke="#4ade80" stroke-width="1.5"/>
  <text x="570" y="67" text-anchor="middle" font-family="monospace" font-size="12" fill="#4ade80" font-weight="bold">Spring IoC Container</text>

  <!-- Arrow IoC → UserRepository -->
  <line x1="520" y1="82" x2="464" y2="108" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Arrow IoC → UserService -->
  <line x1="620" y1="82" x2="676" y2="108" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- UserRepository (injected) -->
  <rect x="390" y="108" width="130" height="52" rx="5" fill="#1a1a1a" stroke="#262626" stroke-width="1.5"/>
  <text x="455" y="131" text-anchor="middle" font-family="monospace" font-size="12" fill="#f1ecec" font-weight="bold">UserRepository</text>
  <text x="455" y="148" text-anchor="middle" font-family="monospace" font-size="9"  fill="#656363">@Repository</text>

  <!-- "injects" dashed arrow -->
  <line x1="522" y1="134" x2="570" y2="134" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-green-dash)"/>
  <text x="546" y="127" text-anchor="middle" font-family="monospace" font-size="9" fill="#4ade80">injects</text>

  <!-- UserService (receives) -->
  <rect x="572" y="108" width="130" height="52" rx="5" fill="#1a1a1a" stroke="#262626" stroke-width="1.5"/>
  <text x="637" y="131" text-anchor="middle" font-family="monospace" font-size="12" fill="#f1ecec" font-weight="bold">UserService</text>
  <text x="637" y="148" text-anchor="middle" font-family="monospace" font-size="9"  fill="#656363">@Service</text>

  <!-- Benefits -->
  <text x="570" y="188" text-anchor="middle" font-family="monospace" font-size="10" fill="#4ade80">✓  loosely coupled — swap any implementation</text>
  <text x="570" y="207" text-anchor="middle" font-family="monospace" font-size="10" fill="#4ade80">✓  pass a fake in tests — no real database needed</text>
</svg>
