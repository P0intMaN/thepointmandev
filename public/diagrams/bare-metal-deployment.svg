<svg xmlns="http://www.w3.org/2000/svg" width="760" height="280" viewBox="0 0 760 280">
  <rect width="760" height="280" fill="#0d0d0d"/>

  <text x="380" y="22" text-anchor="middle" fill="#656363" font-family="monospace" font-size="10">// every dependency installed directly on the OS — no isolation, no boundary</text>

  <!-- DEV machine -->
  <rect x="30" y="36" width="210" height="224" rx="4" fill="#141414" stroke="#4ade80" stroke-width="1.5"/>
  <text x="135" y="56" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="11" font-weight="bold">Dev Machine</text>
  <text x="135" y="70" text-anchor="middle" fill="#656363" font-family="monospace" font-size="9">macOS 13 / Ubuntu 22</text>

  <rect x="48" y="80" width="174" height="22" rx="2" fill="#1a1a1a" stroke="#262626"/>
  <text x="135" y="96" text-anchor="middle" fill="#f1ecec" font-family="monospace" font-size="9">Your App</text>

  <rect x="48" y="110" width="174" height="18" rx="2" fill="#1a1a1a" stroke="#262626"/>
  <text x="135" y="123" text-anchor="middle" fill="#b7b1b1" font-family="monospace" font-size="8">Python 3.11.2</text>
  <rect x="48" y="132" width="174" height="18" rx="2" fill="#1a1a1a" stroke="#262626"/>
  <text x="135" y="145" text-anchor="middle" fill="#b7b1b1" font-family="monospace" font-size="8">Django 4.2.1</text>
  <rect x="48" y="154" width="174" height="18" rx="2" fill="#1a1a1a" stroke="#262626"/>
  <text x="135" y="167" text-anchor="middle" fill="#b7b1b1" font-family="monospace" font-size="8">libssl 3.0.2</text>
  <rect x="48" y="176" width="174" height="18" rx="2" fill="#1a1a1a" stroke="#262626"/>
  <text x="135" y="189" text-anchor="middle" fill="#b7b1b1" font-family="monospace" font-size="8">PostgreSQL client 14.2</text>

  <rect x="48" y="204" width="174" height="46" rx="2" fill="#0d1a0d" stroke="#262626"/>
  <text x="135" y="220" text-anchor="middle" fill="#656363" font-family="monospace" font-size="8">Operating System</text>
  <text x="135" y="234" text-anchor="middle" fill="#656363" font-family="monospace" font-size="8">kernel 5.19</text>
  <text x="135" y="246" text-anchor="middle" fill="#656363" font-family="monospace" font-size="8">Hardware</text>

  <!-- Arrow: works on dev -->
  <text x="270" y="148" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="9">✓ works</text>
  <line x1="242" y1="155" x2="278" y2="155" stroke="#4ade80" stroke-width="1.5"/>
  <polygon points="276,151 284,155 276,159" fill="#4ade80"/>

  <!-- PROD server -->
  <rect x="290" y="36" width="210" height="224" rx="4" fill="#141414" stroke="#f87171" stroke-width="1.5"/>
  <text x="395" y="56" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="11" font-weight="bold">Production Server</text>
  <text x="395" y="70" text-anchor="middle" fill="#656363" font-family="monospace" font-size="9">CentOS 7 (never updated)</text>

  <rect x="308" y="80" width="174" height="22" rx="2" fill="#1a1a1a" stroke="#262626"/>
  <text x="395" y="96" text-anchor="middle" fill="#f1ecec" font-family="monospace" font-size="9">Your App</text>

  <rect x="308" y="110" width="174" height="18" rx="2" fill="#1c0a0a" stroke="#f87171"/>
  <text x="395" y="123" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="8">Python 3.6.8 ← wrong version</text>
  <rect x="308" y="132" width="174" height="18" rx="2" fill="#1c0a0a" stroke="#f87171"/>
  <text x="395" y="145" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="8">Django 3.0.0 ← outdated</text>
  <rect x="308" y="154" width="174" height="18" rx="2" fill="#1a1a1a" stroke="#262626"/>
  <text x="395" y="167" text-anchor="middle" fill="#b7b1b1" font-family="monospace" font-size="8">libssl 1.0.2 ← ancient</text>
  <rect x="308" y="176" width="174" height="18" rx="2" fill="#1c0a0a" stroke="#f87171"/>
  <text x="395" y="189" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="8">PostgreSQL client 9.2 ← missing</text>

  <rect x="308" y="204" width="174" height="46" rx="2" fill="#1c0a0a" stroke="#262626"/>
  <text x="395" y="220" text-anchor="middle" fill="#656363" font-family="monospace" font-size="8">Operating System</text>
  <text x="395" y="234" text-anchor="middle" fill="#656363" font-family="monospace" font-size="8">kernel 3.10 (2013)</text>
  <text x="395" y="246" text-anchor="middle" fill="#656363" font-family="monospace" font-size="8">Hardware</text>

  <!-- CRASH result -->
  <rect x="524" y="80" width="210" height="180" rx="4" fill="#1c0a0a" stroke="#f87171" stroke-width="1.5"/>
  <text x="629" y="110" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="13" font-weight="bold">💥 CRASH</text>
  <text x="629" y="134" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="9">ImportError: cannot</text>
  <text x="629" y="148" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="9">import name 'escape'</text>
  <text x="629" y="162" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="9">from 'jinja2'</text>
  <text x="629" y="186" text-anchor="middle" fill="#656363" font-family="monospace" font-size="8">3am. On-call engineer</text>
  <text x="629" y="200" text-anchor="middle" fill="#656363" font-family="monospace" font-size="8">woken up. Rollback.</text>
  <text x="629" y="214" text-anchor="middle" fill="#656363" font-family="monospace" font-size="8">Root cause: different</text>
  <text x="629" y="228" text-anchor="middle" fill="#656363" font-family="monospace" font-size="8">Python minor version.</text>
  <text x="629" y="248" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="9" font-weight="bold">"It worked on my machine."</text>

  <!-- Arrow: crashes on prod -->
  <line x1="502" y1="155" x2="522" y2="155" stroke="#f87171" stroke-width="1.5"/>
  <polygon points="520,151 528,155 520,159" fill="#f87171"/>
  <text x="512" y="148" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="9">✗ crash</text>
</svg>
