  <text x="250" y="100" text-anchor="middle" fill="#656363" font-family="monospace" font-size="8">npm 8.19 ↑</text>

  <line x1="302" y1="89" x2="338" y2="89" stroke="#262626" stroke-width="1" stroke-dasharray="3,2"/>

  <rect x="340" y="72" width="100" height="34" rx="3" fill="#141414" stroke="#4ade80" stroke-width="1"/>
