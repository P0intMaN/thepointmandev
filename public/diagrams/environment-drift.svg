  <text x="530" y="158" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="8">test failures!</text>

  <!-- PROD row -->
  <text x="30" y="206" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="10" font-weight="bold">PRD</text>

  <rect x="60"  y="188" width="100" height="34" rx="3" fill="#141414" stroke="#f87171" stroke-width="1"/>
  <text x="110" y="204" text-anchor="middle" fill="#b7b1b1" font-family="monospace" font-size="8">Node 18.0</text>
  <text x="110" y="216" text-anchor="middle" fill="#656363" font-family="monospace" font-size="8">npm 8.6</text>

  <line x1="162" y1="205" x2="478" y2="205" stroke="#262626" stroke-width="1" stroke-dasharray="3,2"/>

  <rect x="480" y="188" width="100" height="34" rx="3" fill="#1c0a0a" stroke="#f87171" stroke-width="2"/>
  <text x="530" y="204" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="8">Node 18.0 ← ancient</text>
  <text x="530" y="216" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="8">npm 8.6 ← ancient</text>

  <!-- Divergence bracket on right -->
  <line x1="596" y1="89" x2="616" y2="89" stroke="#f87171" stroke-width="1"/>
  <line x1="596" y1="205" x2="616" y2="205" stroke="#f87171" stroke-width="1"/>
  <line x1="616" y1="89" x2="616" y2="205" stroke="#f87171" stroke-width="1"/>
  <text x="624" y="143" fill="#f87171" font-family="monospace" font-size="9" font-weight="bold">drift</text>
  <text x="624" y="157" fill="#f87171" font-family="monospace" font-size="9" font-weight="bold">zone</text>

  <!-- Vertical divider showing "Day 1 identical" -->
  <line x1="162" y1="58" x2="162" y2="230" stroke="#262626" stroke-width="1" stroke-dasharray="2,4"/>
