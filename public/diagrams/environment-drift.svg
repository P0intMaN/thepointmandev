  <line x1="442" y1="89" x2="478" y2="89" stroke="#262626" stroke-width="1" stroke-dasharray="3,2"/>

  <rect x="480" y="72" width="100" height="34" rx="3" fill="#141414" stroke="#4ade80" stroke-width="1"/>
  <text x="530" y="88" text-anchor="middle" fill="#b7b1b1" font-family="monospace" font-size="8">Node 20.9 ↑</text>
  <text x="530" y="100" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="8">new packages ✓</text>

  <!-- STAGING row -->
  <text x="30" y="148" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="10" font-weight="bold">STG</text>

