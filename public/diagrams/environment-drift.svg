  <rect x="60"  y="72" width="100" height="34" rx="3" fill="#141414" stroke="#4ade80" stroke-width="1"/>
  <text x="110" y="88" text-anchor="middle" fill="#b7b1b1" font-family="monospace" font-size="8">Node 18.0</text>
  <text x="110" y="100" text-anchor="middle" fill="#656363" font-family="monospace" font-size="8">npm 8.6</text>

  <line x1="162" y1="89" x2="198" y2="89" stroke="#262626" stroke-width="1" stroke-dasharray="3,2"/>

  <rect x="200" y="72" width="100" height="34" rx="3" fill="#141414" stroke="#4ade80" stroke-width="1"/>
