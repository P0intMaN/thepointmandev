  <text x="110" y="158" text-anchor="middle" fill="#656363" font-family="monospace" font-size="8">npm 8.6</text>

  <line x1="162" y1="147" x2="338" y2="147" stroke="#262626" stroke-width="1" stroke-dasharray="3,2"/>

  <rect x="340" y="130" width="100" height="34" rx="3" fill="#141414" stroke="#fbbf24" stroke-width="1"/>
