<svg xmlns="http://www.w3.org/2000/svg" width="760" height="380" viewBox="0 0 760 380">
  <rect width="760" height="380" fill="#0d0d0d"/>

  <text x="380" y="18" text-anchor="middle" fill="#656363" font-family="monospace" font-size="10">// a registry is an HTTP server backed by a content-addressed blob store — every pull and push is a sequence of API calls</text>

  <!-- CLIENT side -->
  <rect x="16" y="28" width="130" height="340" rx="3" fill="#141414" stroke="#4ade80" stroke-width="1.5"/>
  <text x="81" y="46" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="8" font-weight="bold">Docker Client</text>

  <!-- REGISTRY API -->
  <rect x="200" y="28" width="226" height="340" rx="3" fill="#141414" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="313" y="46" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="8" font-weight="bold">Registry  (OCI Distribution Spec)</text>

  <!-- BLOB STORE -->
  <rect x="490" y="28" width="254" height="340" rx="3" fill="#141414" stroke="#67e8f9" stroke-width="1.5"/>
  <text x="617" y="46" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="8" font-weight="bold">Content-Addressed Blob Store</text>

  <!-- API endpoints listed in registry panel -->
  <rect x="210" y="56" width="206" height="18" rx="1" fill="#1a1200" stroke="#fbbf24" stroke-width="1"/>
  <text x="313" y="68" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="7">GET  /v2/  → 200  (ping / auth check)</text>

  <rect x="210" y="80" width="206" height="18" rx="1" fill="#141414" stroke="#262626"/>
  <text x="313" y="92" text-anchor="middle" fill="#656363" font-family="monospace" font-size="7">GET  /v2/{name}/tags/list</text>

  <rect x="210" y="104" width="206" height="18" rx="1" fill="#141414" stroke="#262626"/>
  <text x="313" y="116" text-anchor="middle" fill="#656363" font-family="monospace" font-size="7">GET  /v2/{name}/manifests/{ref}</text>

  <rect x="210" y="128" width="206" height="18" rx="1" fill="#141414" stroke="#262626"/>
  <text x="313" y="140" text-anchor="middle" fill="#656363" font-family="monospace" font-size="7">GET  /v2/{name}/blobs/{digest}</text>

  <rect x="210" y="152" width="206" height="18" rx="1" fill="#141414" stroke="#262626"/>
  <text x="313" y="164" text-anchor="middle" fill="#656363" font-family="monospace" font-size="7">HEAD /v2/{name}/blobs/{digest}  → exists?</text>

  <rect x="210" y="176" width="206" height="18" rx="1" fill="#141414" stroke="#262626"/>
  <text x="313" y="188" text-anchor="middle" fill="#656363" font-family="monospace" font-size="7">POST /v2/{name}/blobs/uploads/</text>

  <rect x="210" y="200" width="206" height="18" rx="1" fill="#141414" stroke="#262626"/>
  <text x="313" y="212" text-anchor="middle" fill="#656363" font-family="monospace" font-size="7">PUT  /v2/{name}/blobs/uploads/{uuid}</text>

  <rect x="210" y="224" width="206" height="18" rx="1" fill="#141414" stroke="#262626"/>
  <text x="313" y="236" text-anchor="middle" fill="#656363" font-family="monospace" font-size="7">PUT  /v2/{name}/manifests/{ref}</text>

  <!-- Push flow arrows (left side going down on client) -->
  <text x="81" y="72" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="6">docker push</text>

  <!-- step 1: HEAD check -->
  <line x1="146" y1="90" x2="200" y2="90" stroke="#67e8f9" stroke-width="1"/>
  <polygon points="198,86 206,90 198,94" fill="#67e8f9"/>
  <text x="173" y="85" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="6">HEAD layer</text>

  <line x1="200" y1="102" x2="146" y2="102" stroke="#67e8f9" stroke-width="1"/>
  <polygon points="148,98 140,102 148,106" fill="#67e8f9"/>
  <text x="173" y="113" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="6">404 or 200</text>

  <!-- step 2: POST + PUT upload (if 404) -->
  <line x1="146" y1="148" x2="200" y2="148" stroke="#4ade80" stroke-width="1"/>
  <polygon points="198,144 206,148 198,152" fill="#4ade80"/>
  <text x="173" y="143" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="6">POST init</text>

  <line x1="146" y1="168" x2="200" y2="168" stroke="#4ade80" stroke-width="1"/>
  <polygon points="198,164 206,168 198,172" fill="#4ade80"/>
  <text x="173" y="163" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="6">PUT blob bytes</text>

  <!-- step 3: PUT manifest -->
  <line x1="146" y1="232" x2="200" y2="232" stroke="#fbbf24" stroke-width="1"/>
  <polygon points="198,228 206,232 198,236" fill="#fbbf24"/>
  <text x="173" y="227" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="6">PUT manifest</text>

  <!-- Blob store contents -->
  <text x="617" y="64" text-anchor="middle" fill="#656363" font-family="monospace" font-size="7">blobs/sha256/</text>

  <rect x="500" y="72" width="234" height="16" rx="1" fill="#0d1a1a" stroke="#67e8f9" stroke-width="1"/>
  <text x="617" y="83" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="6">4abcb236f12a...  (alpine base layer    5.3 MB)</text>

  <rect x="500" y="92" width="234" height="16" rx="1" fill="#0d1a1a" stroke="#67e8f9" stroke-width="1"/>
  <text x="617" y="103" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="6">9b96c5e074a8...  (nginx config layer   22 KB)</text>

  <rect x="500" y="112" width="234" height="16" rx="1" fill="#0d1a1a" stroke="#67e8f9" stroke-width="1"/>
  <text x="617" y="123" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="6">a3ed95caeb02...  (nginx binary layer  12 MB)</text>

  <rect x="500" y="132" width="234" height="16" rx="1" fill="#141414" stroke="#262626" stroke-dasharray="3,2"/>
  <text x="617" y="143" text-anchor="middle" fill="#656363" font-family="monospace" font-size="6">4abcb236f12a...  ← SAME BLOB as above</text>

  <text x="617" y="162" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="6">two images sharing alpine base — stored once</text>

  <!-- arrow from registry to blob store -->
  <line x1="416" y1="100" x2="490" y2="100" stroke="#67e8f9" stroke-width="1" stroke-dasharray="3,2"/>
  <polygon points="488,96 496,100 488,104" fill="#67e8f9"/>

  <!-- Pull flow (below, dashed separator) -->
  <line x1="30" y1="268" x2="730" y2="268" stroke="#262626" stroke-width="1" stroke-dasharray="4,4"/>

  <text x="81" y="290" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="6">docker pull</text>

  <line x1="146" y1="300" x2="200" y2="300" stroke="#4ade80" stroke-width="1"/>
  <polygon points="198,296 206,300 198,304" fill="#4ade80"/>
  <text x="173" y="295" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="6">GET manifest</text>

  <line x1="200" y1="316" x2="146" y2="316" stroke="#4ade80" stroke-width="1"/>
  <polygon points="148,312 140,316 148,320" fill="#4ade80"/>
  <text x="173" y="327" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="6">manifest JSON</text>

  <line x1="146" y1="340" x2="200" y2="340" stroke="#67e8f9" stroke-width="1"/>
  <polygon points="198,336 206,340 198,344" fill="#67e8f9"/>
  <text x="173" y="335" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="6">GET each blob</text>

  <text x="313" y="290" text-anchor="middle" fill="#656363" font-family="monospace" font-size="7">verify sha256 of every downloaded byte</text>
  <text x="313" y="308" text-anchor="middle" fill="#656363" font-family="monospace" font-size="7">skip blobs already in local cache</text>
  <text x="313" y="326" text-anchor="middle" fill="#656363" font-family="monospace" font-size="7">stream blobs to containerd snapshot store</text>

  <rect x="500" y="278" width="234" height="72" rx="2" fill="#1a1a1a" stroke="#262626"/>
  <text x="617" y="296" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="7">client checks local cache first</text>
  <text x="617" y="312" text-anchor="middle" fill="#656363" font-family="monospace" font-size="7">"Already have layer 4abcb236..." → skip</text>
  <text x="617" y="328" text-anchor="middle" fill="#656363" font-family="monospace" font-size="7">only missing layers downloaded</text>
  <text x="617" y="344" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="7">dedup works client-side AND server-side</text>
</svg>
