<svg xmlns="http://www.w3.org/2000/svg" width="760" height="340" viewBox="0 0 760 340">
  <rect width="760" height="340" fill="#0d0d0d"/>

  <text x="380" y="18" text-anchor="middle" fill="#656363" font-family="monospace" font-size="10">// docker run ubuntu echo hello world — what actually happens in the kernel</text>

  <!-- Step 1 -->
  <rect x="16" y="28" width="728" height="34" rx="3" fill="#141414" stroke="#262626"/>
  <text x="32" y="43" fill="#4ade80" font-family="monospace" font-size="9" font-weight="bold">1  </text>
  <text x="52" y="43" fill="#b7b1b1" font-family="monospace" font-size="9" font-weight="bold">Image resolution</text>
  <text x="160" y="43" fill="#656363" font-family="monospace" font-size="9">  check local layer cache → pull missing layers from registry → assemble lowerdir</text>
  <text x="32" y="56" fill="#656363" font-family="monospace" font-size="8">     lesson 8 — OverlayFS lower layers</text>

  <!-- Arrow -->
  <line x1="380" y1="62" x2="380" y2="74" stroke="#262626" stroke-width="1"/>
  <polygon points="376,72 380,78 384,72" fill="#262626"/>

  <!-- Step 2 -->
  <rect x="16" y="78" width="728" height="34" rx="3" fill="#141414" stroke="#262626"/>
  <text x="32" y="93" fill="#4ade80" font-family="monospace" font-size="9" font-weight="bold">2  </text>
  <text x="52" y="93" fill="#b7b1b1" font-family="monospace" font-size="9" font-weight="bold">Filesystem setup</text>
  <text x="163" y="93" fill="#656363" font-family="monospace" font-size="9">  create fresh upperdir + workdir → mount OverlayFS → container has its own / view</text>
  <text x="32" y="106" fill="#656363" font-family="monospace" font-size="8">     lesson 8 — OverlayFS, copy-on-write, ephemeral upper layer</text>

  <!-- Arrow -->
  <line x1="380" y1="112" x2="380" y2="124" stroke="#262626" stroke-width="1"/>
  <polygon points="376,122 380,128 384,122" fill="#262626"/>

  <!-- Step 3 -->
  <rect x="16" y="128" width="728" height="34" rx="3" fill="#141414" stroke="#262626"/>
  <text x="32" y="143" fill="#4ade80" font-family="monospace" font-size="9" font-weight="bold">3  </text>
  <text x="52" y="143" fill="#b7b1b1" font-family="monospace" font-size="9" font-weight="bold">Namespace creation</text>
  <text x="174" y="143" fill="#656363" font-family="monospace" font-size="9">  unshare(PID + NET + MNT + UTS + IPC + USER) → six isolated views of system resources</text>
  <text x="32" y="156" fill="#656363" font-family="monospace" font-size="8">     lesson 6 — Linux namespaces: the process now believes it owns the machine</text>

  <!-- Arrow -->
  <line x1="380" y1="162" x2="380" y2="174" stroke="#262626" stroke-width="1"/>
  <polygon points="376,172 380,178 384,172" fill="#262626"/>

  <!-- Step 4 -->
  <rect x="16" y="178" width="728" height="34" rx="3" fill="#141414" stroke="#262626"/>
  <text x="32" y="193" fill="#4ade80" font-family="monospace" font-size="9" font-weight="bold">4  </text>
  <text x="52" y="193" fill="#b7b1b1" font-family="monospace" font-size="9" font-weight="bold">Cgroup assignment</text>
  <text x="166" y="193" fill="#656363" font-family="monospace" font-size="9">  mkdir /sys/fs/cgroup/docker/&lt;id&gt; → write limits → write PID into cgroup.procs</text>
  <text x="32" y="206" fill="#656363" font-family="monospace" font-size="8">     lesson 7 — cgroups: resource ceiling enforced by kernel from this point on</text>

  <!-- Arrow -->
  <line x1="380" y1="212" x2="380" y2="224" stroke="#262626" stroke-width="1"/>
  <polygon points="376,222 380,228 384,222" fill="#262626"/>

  <!-- Step 5 -->
  <rect x="16" y="228" width="728" height="34" rx="3" fill="#141414" stroke="#262626"/>
  <text x="32" y="243" fill="#4ade80" font-family="monospace" font-size="9" font-weight="bold">5  </text>
  <text x="52" y="243" fill="#b7b1b1" font-family="monospace" font-size="9" font-weight="bold">Process start</text>
  <text x="138" y="243" fill="#656363" font-family="monospace" font-size="9">  exec("echo hello world") inside the namespaces, cgroup, and OverlayFS root</text>
  <text x="32" y="256" fill="#656363" font-family="monospace" font-size="8">     lesson 5 — chroot ancestry: process sees only its constructed filesystem root</text>

  <!-- Arrow -->
  <line x1="380" y1="262" x2="380" y2="274" stroke="#262626" stroke-width="1"/>
  <polygon points="376,272 380,278 384,272" fill="#262626"/>

  <!-- Output -->
  <rect x="16" y="278" width="728" height="50" rx="3" fill="#0d1a0d" stroke="#4ade80" stroke-width="1.5"/>
  <text x="32" y="297" fill="#4ade80" font-family="monospace" font-size="12" font-weight="bold">hello world</text>
  <text x="200" y="297" fill="#656363" font-family="monospace" font-size="9">← process exits, kernel tears down namespaces, upperdir deleted, cgroup removed</text>
  <text x="32" y="316" fill="#656363" font-family="monospace" font-size="8">total elapsed: ~200ms  ·  guest OS booted: none  ·  hypervisor overhead: zero</text>
</svg>
