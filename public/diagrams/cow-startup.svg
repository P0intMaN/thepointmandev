<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300">
  <rect width="760" height="300" fill="#0d0d0d"/>

  <text x="380" y="18" text-anchor="middle" fill="#656363" font-family="monospace" font-size="10">// startup is fast because CoW defers all filesystem work until it's actually needed</text>

  <!-- VM timeline -->
  <text x="178" y="36" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="10" font-weight="bold">VM Startup  (~45 seconds)</text>

  <rect x="16" y="46" width="324" height="22" rx="2" fill="#141414" stroke="#fbbf24" stroke-width="1"/>
  <text x="178" y="61" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="8">BIOS / UEFI init</text>

  <rect x="16" y="76" width="324" height="22" rx="2" fill="#141414" stroke="#fbbf24" stroke-width="1"/>
  <text x="178" y="91" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="8">bootloader (GRUB) runs</text>

  <rect x="16" y="106" width="324" height="22" rx="2" fill="#141414" stroke="#fbbf24" stroke-width="1"/>
  <text x="178" y="121" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="8">kernel decompresses and loads (~100MB copied into RAM)</text>

  <rect x="16" y="136" width="324" height="22" rx="2" fill="#141414" stroke="#fbbf24" stroke-width="1"/>
  <text x="178" y="151" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="8">hardware drivers init</text>

  <rect x="16" y="166" width="324" height="22" rx="2" fill="#141414" stroke="#fbbf24" stroke-width="1"/>
  <text x="178" y="181" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="8">systemd starts — launches all configured services</text>

  <rect x="16" y="196" width="324" height="22" rx="2" fill="#141414" stroke="#fbbf24" stroke-width="1"/>
  <text x="178" y="211" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="8">networking comes up</text>

  <rect x="16" y="226" width="324" height="22" rx="2" fill="#1c1400" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="178" y="241" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="8" font-weight="bold">your app starts</text>

  <text x="178" y="270" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="9">each step is mandatory — cannot skip</text>
  <text x="178" y="284" text-anchor="middle" fill="#656363" font-family="monospace" font-size="8">~2 GB RAM copied before first request</text>

  <!-- Divider -->
  <line x1="380" y1="28" x2="380" y2="292" stroke="#262626" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Container timeline -->
  <text x="570" y="36" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="10" font-weight="bold">Container Startup  (~200ms)</text>

  <rect x="396" y="46" width="348" height="22" rx="2" fill="#141414" stroke="#4ade80" stroke-width="1"/>
  <text x="570" y="61" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="8">mount OverlayFS (lowerdir + empty upperdir)</text>

  <rect x="396" y="76" width="348" height="22" rx="2" fill="#141414" stroke="#4ade80" stroke-width="1"/>
  <text x="570" y="91" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="8">create namespaces (6× unshare syscalls)</text>

  <rect x="396" y="106" width="348" height="22" rx="2" fill="#141414" stroke="#4ade80" stroke-width="1"/>
  <text x="570" y="121" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="8">create cgroup, write limits</text>

  <rect x="396" y="136" width="348" height="22" rx="2" fill="#0d1a0d" stroke="#4ade80" stroke-width="1.5"/>
  <text x="570" y="151" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="8" font-weight="bold">exec() your process — it starts immediately</text>

  <text x="570" y="186" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="8">no OS to boot — shares the host kernel</text>
  <text x="570" y="200" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="8">no files copied — CoW defers all reads/writes</text>
  <text x="570" y="214" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="8">image layers already on disk — just mount pointers</text>

  <rect x="396" y="234" width="348" height="44" rx="3" fill="#0d1a0d" stroke="#4ade80" stroke-width="1"/>
  <text x="570" y="252" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="9" font-weight="bold">result: 1000 containers from same image</text>
  <text x="570" y="268" text-anchor="middle" fill="#656363" font-family="monospace" font-size="8">each starts in ~200ms with zero file copying</text>
  <text x="570" y="280" text-anchor="middle" fill="#656363" font-family="monospace" font-size="8">files only read from disk when actually accessed</text>
</svg>
