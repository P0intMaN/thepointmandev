<svg xmlns="http://www.w3.org/2000/svg" width="760" height="130" viewBox="0 0 760 130">
  <rect width="760" height="130" fill="#0d0d0d"/>

  <!-- 6 stages: box w=80, gap=20, total=6*80+5*20=580, margin=90 -->
  <!-- Positions: 90, 190, 290, 390, 490, 590 -->

  <!-- Stage 1: INSTANTIATE -->
  <rect x="90" y="28" width="80" height="74" rx="3" fill="#141414" stroke="#262626" stroke-width="1.5"/>
  <text x="130" y="48" text-anchor="middle" fill="#656363" font-family="monospace" font-size="9">1</text>
  <text x="130" y="64" text-anchor="middle" fill="#b7b1b1" font-family="monospace" font-size="9" font-weight="bold">INSTAN-</text>
  <text x="130" y="77" text-anchor="middle" fill="#b7b1b1" font-family="monospace" font-size="9" font-weight="bold">TIATE</text>
  <text x="130" y="93" text-anchor="middle" fill="#656363" font-family="monospace" font-size="8">constructor</text>

  <!-- Arrow 1→2 -->
  <line x1="172" y1="65" x2="188" y2="65" stroke="#262626" stroke-width="1.5"/>
  <polygon points="186,61 194,65 186,69" fill="#262626"/>

  <!-- Stage 2: INJECT -->
  <rect x="196" y="28" width="80" height="74" rx="3" fill="#141414" stroke="#4ade80" stroke-width="1.5"/>
  <text x="236" y="48" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="9">2</text>
  <text x="236" y="64" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="9" font-weight="bold">INJECT</text>
  <text x="236" y="79" text-anchor="middle" fill="#656363" font-family="monospace" font-size="8">dependencies</text>
  <text x="236" y="93" text-anchor="middle" fill="#656363" font-family="monospace" font-size="8">set</text>

  <!-- Arrow 2→3 -->
  <line x1="278" y1="65" x2="288" y2="65" stroke="#262626" stroke-width="1.5"/>
  <polygon points="286,61 294,65 286,69" fill="#262626"/>

  <!-- Stage 3: @PostConstruct -->
  <rect x="296" y="28" width="88" height="74" rx="3" fill="#141414" stroke="#4ade80" stroke-width="1.5"/>
  <text x="340" y="48" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="9">3</text>
  <text x="340" y="63" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="9" font-weight="bold">@Post-</text>
  <text x="340" y="76" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="9" font-weight="bold">Construct</text>
  <text x="340" y="93" text-anchor="middle" fill="#656363" font-family="monospace" font-size="8">init logic</text>

  <!-- Arrow 3→4 -->
  <line x1="386" y1="65" x2="394" y2="65" stroke="#262626" stroke-width="1.5"/>
  <polygon points="392,61 400,65 392,69" fill="#262626"/>

  <!-- Stage 4: IN USE -->
  <rect x="402" y="28" width="80" height="74" rx="3" fill="#141414" stroke="#67e8f9" stroke-width="1.5"/>
  <text x="442" y="48" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="9">4</text>
  <text x="442" y="64" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="9" font-weight="bold">IN USE</text>
  <text x="442" y="79" text-anchor="middle" fill="#656363" font-family="monospace" font-size="8">serving all</text>
  <text x="442" y="93" text-anchor="middle" fill="#656363" font-family="monospace" font-size="8">requests</text>

  <!-- Arrow 4→5 -->
  <line x1="484" y1="65" x2="494" y2="65" stroke="#262626" stroke-width="1.5"/>
  <polygon points="492,61 500,65 492,69" fill="#262626"/>

  <!-- Stage 5: @PreDestroy -->
  <rect x="502" y="28" width="88" height="74" rx="3" fill="#141414" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="546" y="48" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="9">5</text>
  <text x="546" y="63" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="9" font-weight="bold">@Pre-</text>
  <text x="546" y="76" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="9" font-weight="bold">Destroy</text>
  <text x="546" y="93" text-anchor="middle" fill="#656363" font-family="monospace" font-size="8">cleanup</text>

  <!-- Arrow 5→6 -->
  <line x1="592" y1="65" x2="600" y2="65" stroke="#262626" stroke-width="1.5"/>
  <polygon points="598,61 606,65 598,69" fill="#262626"/>

  <!-- Stage 6: DESTROYED -->
  <rect x="608" y="28" width="80" height="74" rx="3" fill="#141414" stroke="#f87171" stroke-width="1.5"/>
  <text x="648" y="48" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="9">6</text>
  <text x="648" y="63" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="9" font-weight="bold">DESTROY-</text>
  <text x="648" y="76" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="9" font-weight="bold">ED</text>
  <text x="648" y="93" text-anchor="middle" fill="#656363" font-family="monospace" font-size="8">released</text>
</svg>
