<svg xmlns="http://www.w3.org/2000/svg" width="760" height="220" viewBox="0 0 760 220">
  <rect width="760" height="220" fill="#0d0d0d"/>

  <!-- Top: @SpringBootApplication -->
  <rect x="220" y="16" width="320" height="52" rx="3" fill="#141414" stroke="#4ade80" stroke-width="2"/>
  <text x="380" y="40" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="14" font-weight="bold">@SpringBootApplication</text>
  <text x="380" y="58" text-anchor="middle" fill="#656363" font-family="monospace" font-size="9">meta-annotation — combines three annotations into one</text>

  <!-- Branching lines -->
  <line x1="310" y1="68" x2="140" y2="108" stroke="#262626" stroke-width="1.5"/>
  <line x1="380" y1="68" x2="380" y2="108" stroke="#262626" stroke-width="1.5"/>
  <line x1="450" y1="68" x2="620" y2="108" stroke="#262626" stroke-width="1.5"/>

  <!-- Bottom left: @SpringBootConfiguration -->
  <rect x="24" y="110" width="232" height="90" rx="3" fill="#141414" stroke="#67e8f9" stroke-width="1.5"/>
  <text x="140" y="132" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="11" font-weight="bold">@SpringBoot-</text>
  <text x="140" y="147" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="11" font-weight="bold">Configuration</text>
  <text x="140" y="165" text-anchor="middle" fill="#656363" font-family="monospace" font-size="9">marks this class as a</text>
  <text x="140" y="179" text-anchor="middle" fill="#656363" font-family="monospace" font-size="9">source of @Bean</text>
  <text x="140" y="193" text-anchor="middle" fill="#656363" font-family="monospace" font-size="9">definitions</text>

  <!-- Bottom center: @EnableAutoConfiguration -->
  <rect x="268" y="110" width="224" height="90" rx="3" fill="#141414" stroke="#4ade80" stroke-width="2"/>
  <text x="380" y="132" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="11" font-weight="bold">@EnableAuto-</text>
  <text x="380" y="147" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="11" font-weight="bold">Configuration</text>
  <text x="380" y="165" text-anchor="middle" fill="#656363" font-family="monospace" font-size="9">reads classpath, activates</text>
  <text x="380" y="179" text-anchor="middle" fill="#656363" font-family="monospace" font-size="9">matching auto-configs</text>
  <text x="380" y="193" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="9">the real magic is here</text>

  <!-- Bottom right: @ComponentScan -->
  <rect x="504" y="110" width="232" height="90" rx="3" fill="#141414" stroke="#67e8f9" stroke-width="1.5"/>
  <text x="620" y="132" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="11" font-weight="bold">@Component-</text>
  <text x="620" y="147" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="11" font-weight="bold">Scan</text>
  <text x="620" y="165" text-anchor="middle" fill="#656363" font-family="monospace" font-size="9">finds @Service, @Repository</text>
  <text x="620" y="179" text-anchor="middle" fill="#656363" font-family="monospace" font-size="9">@Controller in your</text>
  <text x="620" y="193" text-anchor="middle" fill="#656363" font-family="monospace" font-size="9">package + sub-packages</text>
</svg>
