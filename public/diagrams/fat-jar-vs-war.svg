<svg xmlns="http://www.w3.org/2000/svg" width="760" height="270" viewBox="0 0 760 270">
  <rect width="760" height="270" fill="#0d0d0d"/>

  <!-- LEFT PANEL: Old model -->
  <rect x="16" y="16" width="346" height="238" rx="4" fill="#141414" stroke="#f87171" stroke-width="1"/>
  <text x="189" y="34" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="10" font-weight="bold">BEFORE — App lives inside server</text>

  <!-- Tomcat outer box -->
  <rect x="32" y="42" width="314" height="200" rx="3" fill="#1a1010" stroke="#f87171" stroke-width="1.5"/>
  <text x="189" y="60" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="11" font-weight="bold">External Tomcat</text>
  <text x="189" y="76" text-anchor="middle" fill="#656363" font-family="monospace" font-size="9">installed separately — shared by all apps</text>

  <!-- WAR files inside Tomcat -->
  <rect x="52" y="88" width="88" height="52" rx="3" fill="#141414" stroke="#f87171" stroke-width="1"/>
  <text x="96" y="112" text-anchor="middle" fill="#b7b1b1" font-family="monospace" font-size="10" font-weight="bold">app1.war</text>
  <text x="96" y="126" text-anchor="middle" fill="#656363" font-family="monospace" font-size="8">your app</text>

  <rect x="152" y="88" width="88" height="52" rx="3" fill="#141414" stroke="#262626" stroke-width="1"/>
  <text x="196" y="112" text-anchor="middle" fill="#656363" font-family="monospace" font-size="10">app2.war</text>
  <text x="196" y="126" text-anchor="middle" fill="#656363" font-family="monospace" font-size="8">other team</text>

  <rect x="252" y="88" width="80" height="52" rx="3" fill="#141414" stroke="#262626" stroke-width="1"/>
  <text x="292" y="112" text-anchor="middle" fill="#656363" font-family="monospace" font-size="10">app3.war</text>
  <text x="292" y="126" text-anchor="middle" fill="#656363" font-family="monospace" font-size="8">other team</text>

  <!-- Problems -->
  <text x="52" y="162" fill="#f87171" font-family="monospace" font-size="9">✗ shared classloader — library conflicts</text>
  <text x="52" y="178" fill="#f87171" font-family="monospace" font-size="9">✗ one app crash → all apps down</text>
  <text x="52" y="194" fill="#f87171" font-family="monospace" font-size="9">✗ Tomcat version mismatch (dev vs prod)</text>
  <text x="52" y="210" fill="#f87171" font-family="monospace" font-size="9">✗ copy WAR + restart ceremony</text>
  <text x="52" y="226" fill="#f87171" font-family="monospace" font-size="9">✗ config split across server + app</text>

  <!-- RIGHT PANEL: New model -->
  <rect x="398" y="16" width="346" height="238" rx="4" fill="#141414" stroke="#4ade80" stroke-width="1"/>
  <text x="571" y="34" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="10" font-weight="bold">AFTER — Server lives inside app</text>

  <!-- Fat JAR outer box -->
  <rect x="414" y="42" width="314" height="200" rx="3" fill="#0d1a0d" stroke="#4ade80" stroke-width="1.5"/>
  <text x="571" y="60" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="11" font-weight="bold">myapp.jar</text>
  <text x="571" y="76" text-anchor="middle" fill="#656363" font-family="monospace" font-size="9">self-contained — carries everything it needs</text>

  <!-- Contents of fat JAR -->
  <rect x="434" y="88" width="274" height="30" rx="3" fill="#141414" stroke="#262626" stroke-width="1"/>
  <text x="571" y="108" text-anchor="middle" fill="#b7b1b1" font-family="monospace" font-size="10">Your Code (BOOT-INF/classes/)</text>

  <rect x="434" y="124" width="274" height="30" rx="3" fill="#141414" stroke="#262626" stroke-width="1"/>
  <text x="571" y="144" text-anchor="middle" fill="#b7b1b1" font-family="monospace" font-size="10">All Dependencies (BOOT-INF/lib/)</text>

  <!-- Embedded Tomcat (highlighted) -->
  <rect x="434" y="160" width="274" height="30" rx="3" fill="#1a1010" stroke="#67e8f9" stroke-width="1.5"/>
  <text x="571" y="180" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="10" font-weight="bold">Embedded Tomcat (bundled)</text>

  <!-- Benefits -->
  <text x="571" y="218" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="10" font-weight="bold">java -jar myapp.jar</text>
  <text x="571" y="234" text-anchor="middle" fill="#656363" font-family="monospace" font-size="9">that's the entire deployment command</text>
</svg>
