<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300">
  <rect width="760" height="300" fill="#0d0d0d"/>

  <text x="380" y="18" text-anchor="middle" fill="#656363" font-family="monospace" font-size="10">// the pivot: strip the PaaS layer, open-source what's underneath</text>

  <!-- BEFORE column -->
  <text x="190" y="38" text-anchor="middle" fill="#b7b1b1" font-family="monospace" font-size="10" font-weight="bold">dotCloud (2010–2013)</text>
  <text x="190" y="52" text-anchor="middle" fill="#656363" font-family="monospace" font-size="9">PaaS business — competing with Heroku</text>

  <!-- PaaS API layer -->
  <rect x="32" y="62" width="316" height="44" rx="3" fill="#1a1a1a" stroke="#262626" stroke-width="1"/>
  <text x="190" y="80" text-anchor="middle" fill="#b7b1b1" font-family="monospace" font-size="9" font-weight="bold">PaaS API Layer</text>
  <text x="190" y="96" text-anchor="middle" fill="#656363" font-family="monospace" font-size="8">git push → build → deploy → route</text>

  <!-- dotCloud runtime -->
  <rect x="32" y="116" width="316" height="44" rx="3" fill="#0d1a0d" stroke="#4ade80" stroke-width="1.5"/>
  <text x="190" y="134" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="9" font-weight="bold">Internal Container Runtime</text>
  <text x="190" y="150" text-anchor="middle" fill="#656363" font-family="monospace" font-size="8">LXC + dotCloud tooling — the secret sauce</text>

  <!-- Linux kernel -->
  <rect x="32" y="170" width="316" height="44" rx="3" fill="#141414" stroke="#262626" stroke-width="1"/>
  <text x="190" y="188" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="9" font-weight="bold">Linux Kernel</text>
  <text x="190" y="204" text-anchor="middle" fill="#656363" font-family="monospace" font-size="8">namespaces + cgroups (always been there)</text>

  <text x="190" y="232" text-anchor="middle" fill="#656363" font-family="monospace" font-size="8">business struggling — Heroku growing faster</text>
  <text x="190" y="248" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="8">insight: the runtime layer is the real product</text>

  <!-- Arrow in middle -->
  <line x1="374" y1="150" x2="390" y2="150" stroke="#4ade80" stroke-width="2"/>
  <polygon points="388,146 396,150 388,154" fill="#4ade80"/>
  <text x="383" y="143" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="8">pivot</text>
  <text x="383" y="163" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="8">Mar 2013</text>

  <!-- AFTER column -->
  <text x="570" y="38" text-anchor="middle" fill="#b7b1b1" font-family="monospace" font-size="10" font-weight="bold">Docker (March 2013 →)</text>
  <text x="570" y="52" text-anchor="middle" fill="#656363" font-family="monospace" font-size="9">open-source tool — 10k GitHub stars in one week</text>

  <!-- Dropped PaaS layer — crossed out style -->
  <rect x="412" y="62" width="316" height="44" rx="3" fill="#1a1a1a" stroke="#262626" stroke-width="1" stroke-dasharray="4,4" opacity=".35"/>
  <text x="570" y="80" text-anchor="middle" fill="#656363" font-family="monospace" font-size="9" opacity=".4">PaaS API Layer</text>
  <text x="570" y="96" text-anchor="middle" fill="#f87171" font-family="monospace" font-size="8">dropped — not open-sourced</text>
  <!-- Strike line -->
  <line x1="420" y1="84" x2="720" y2="84" stroke="#f87171" stroke-width="1.5" opacity=".5"/>

  <!-- Docker engine — highlighted -->
  <rect x="412" y="116" width="316" height="44" rx="3" fill="#0d1a0d" stroke="#4ade80" stroke-width="2"/>
  <text x="570" y="134" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="9" font-weight="bold">Docker Engine (open source)</text>
  <text x="570" y="150" text-anchor="middle" fill="#656363" font-family="monospace" font-size="8">build, ship, run any container — on any Linux host</text>

  <!-- Linux kernel -->
  <rect x="412" y="170" width="316" height="44" rx="3" fill="#141414" stroke="#262626" stroke-width="1"/>
  <text x="570" y="188" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="9" font-weight="bold">Linux Kernel</text>
  <text x="570" y="204" text-anchor="middle" fill="#656363" font-family="monospace" font-size="8">namespaces + cgroups (unchanged)</text>

  <text x="570" y="232" text-anchor="middle" fill="#656363" font-family="monospace" font-size="8">PyCon 2013 demo: 5-minute lightning talk</text>
  <text x="570" y="248" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="8">dotCloud renamed: Docker, Inc.</text>
</svg>
